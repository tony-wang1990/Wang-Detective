<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="refresh" content="1;url=/dashboard/home">
    <title>资源地图已迁移 - W-探长</title>
    <style>
        :root {
            color-scheme: light dark;
            --bg: #0f172a;
            --panel: #111c2f;
            --text: #e5eefb;
            --muted: #8ea4bf;
            --brand: #23d6d6;
        }

        * {
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            margin: 0;
            display: grid;
            place-items: center;
            background: radial-gradient(circle at 30% 20%, rgba(35, 214, 214, 0.18), transparent 35%),
                var(--bg);
            color: var(--text);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        }

        main {
            width: min(520px, calc(100vw - 32px));
            padding: 32px;
            border: 1px solid rgba(142, 164, 191, 0.25);
            border-radius: 14px;
            background: rgba(17, 28, 47, 0.86);
            box-shadow: 0 24px 80px rgba(0, 0, 0, 0.32);
        }

        .logo {
            display: inline-grid;
            place-items: center;
            width: 48px;
            height: 48px;
            border-radius: 12px;
            background: linear-gradient(135deg, #1ce5e5, #1294a6);
            color: white;
            font-size: 26px;
            font-weight: 800;
            margin-bottom: 18px;
        }

        h1 {
            margin: 0 0 10px;
            font-size: 24px;
        }

        p {
            margin: 0 0 22px;
            line-height: 1.7;
            color: var(--muted);
        }

        a {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            min-height: 42px;
            padding: 0 18px;
            border-radius: 10px;
            background: var(--brand);
            color: #062029;
            font-weight: 700;
            text-decoration: none;
        }
    </style>
</head>
<body>
<main>
    <div class="logo">W</div>
    <h1>资源地图已迁移</h1>
    <p>旧版静态地图入口已停止展示模拟数据。真实 OCI 资源分布、运行状态和风险信息请在新版控制台首页查看。</p>
    <a href="/dashboard/home">进入新版首页</a>
</main>
</body>
</html>
