services:
  watcher:
    image: docker:27-cli
    container_name: king-detective-watcher
    restart: always
    command: sh /scripts/watcher.sh
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./:/app/king-detective
      - ./scripts/watcher.sh:/scripts/watcher.sh:ro
    environment:
      - TZ=Asia/Shanghai

  king-detective:
    image: ghcr.io/tony-wang1990/wang-detective:main
    container_name: king-detective
    restart: always
    environment:
      - TZ=Asia/Shanghai
      - ADMIN_USERNAME=${ADMIN_USERNAME:-admin}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD:-admin123456}
      - OPS_SSH_SECRET_KEY=${OPS_SSH_SECRET_KEY:-${ADMIN_PASSWORD:-admin123456}}
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN:-}
      - TELEGRAM_BOT_USERNAME=${TELEGRAM_BOT_USERNAME:-king_detective_bot}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-dummy}
      - OPENAI_BASE_URL=${OPENAI_BASE_URL:-https://api.siliconflow.cn}
      - CORS_ALLOWED_ORIGINS=${CORS_ALLOWED_ORIGINS:-*}
    ports:
      - "9527:9527"
    volumes:
      - ./application.yml:/app/king-detective/application.yml:ro
      - ./data:/app/king-detective/data
      - ./keys:/app/king-detective/keys
      - ./logs:/var/log
      - ./runtime:/app/king-detective/runtime
    networks:
      - app-network
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:9527/actuator/health | grep -q '\"status\":\"UP\"'"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 45s

networks:
  app-network:
    driver: bridge
